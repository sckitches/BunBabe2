<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile – BunBabe 🧶</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="stylesheet" href="style.css" />
    <style>
        .profile-container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .profile-container { grid-template-columns: 1fr; }
        }

        .profile-sidebar {
            background: var(--white);
            border: 2px solid var(--pink-light);
            border-radius: var(--radius);
            padding: 1.5rem;
            height: fit-content;
        }

        .profile-avatar {
            font-size: 3.5rem;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .profile-name {
            font-size: 1.2rem;
            font-weight: 800;
            text-align: center;
            color: var(--text);
            margin-bottom: 1.5rem;
        }

        .profile-nav-btn {
            display: block;
            width: 100%;
            padding: 0.8rem 1rem;
            margin-bottom: 0.5rem;
            background: var(--cream);
            border: 1px solid transparent;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 700;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text);
        }

        .profile-nav-btn:hover { background: var(--pink-light); }
        .profile-nav-btn.active {
            background: var(--pink-light);
            border-color: var(--pink);
            color: var(--pink-dark);
        }

        .profile-content {
            background: var(--white);
            border: 2px solid var(--pink-light);
            border-radius: var(--radius);
            padding: 2rem;
            min-height: 400px;
        }

        .tab-section { display: none; }
        .tab-section.active { display: block; animation: fadeIn 0.3s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Receipts List */
        .receipt-card {
            border: 2px dashed var(--pink-light);
            border-radius: 14px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fffdf5;
        }
        
        @media (max-width: 500px) {
            .receipt-card { flex-direction: column; gap: 1rem; align-items: flex-start; }
            .receipt-actions { width: 100%; display: flex; justify-content: space-between; }
        }

        .receipt-info h4 { margin-bottom: 0.3rem; color: var(--pink-dark); }
        .receipt-info p { font-size: 0.85rem; color: var(--text-light); }
        
        .status-pill {
            display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-top: 0.4rem;
        }
        .s-pending { background: #fff4e5; color: #ed6c02; }
        .s-delivered { background: #e6f7ed; color: #2e7d32; }

        .receipt-actions button, .receipt-actions a {
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn-view { background: var(--pink-dark); color: white; margin-right: 0.5rem; }
        .btn-delete { background: var(--cream); border: 2px solid var(--pink-light); color: var(--text); }

        /* Inbox */
        .inbox-msg {
            background: var(--cream);
            border-left: 4px solid var(--pink-dark);
            padding: 1.2rem;
            border-radius: 0 12px 12px 0;
            margin-bottom: 1rem;
        }
        .msg-header {
            display: flex; justify-content: space-between; margin-bottom: 0.5rem;
        }
        .msg-title { font-weight: 800; color: var(--text); }
        .msg-date { font-size: 0.8rem; color: var(--text-light); }
        .msg-body { font-size: 0.9rem; line-height: 1.5; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-logo">
            <img src="logo.png" alt="BunBabe Logo">
            BunBabe
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="auth.html" onclick="logout()">Logout</a></li>
        </ul>
    </nav>

    <div class="profile-container">
        <aside class="profile-sidebar">
            <div class="profile-avatar">🧸</div>
            <div class="profile-name" id="userName">Bunny Babe</div>
            <button class="profile-nav-btn active" onclick="switchTab('receipts', this)">🧾 My Receipts</button>
            <button class="profile-nav-btn" onclick="switchTab('inbox', this)">💌 Inbox <span id="unreadBadge" style="background:var(--pink-dark);color:white;padding:2px 6px;border-radius:10px;font-size:0.75rem;margin-left:5px;display:none;">New</span></button>
        </aside>

        <main class="profile-content">
            <!-- Receipts Tab -->
            <div id="tab-receipts" class="tab-section active">
                <h2 style="margin-bottom: 0.5rem;">My Receipt History 🧾</h2>
                <p style="color:var(--text-light); margin-bottom: 2rem; font-size:0.9rem;">View, print, or delete your past magical purchases.</p>
                <div id="receiptsList">
                    <p style="text-align:center; padding:2rem;">Loading your receipts... ✨</p>
                </div>
            </div>

            <!-- Inbox Tab -->
            <div id="tab-inbox" class="tab-section">
                <h2 style="margin-bottom: 0.5rem;">My Inbox 💌</h2>
                <p style="color:var(--text-light); margin-bottom: 2rem; font-size:0.9rem;">Messages and updates directly from the BunBabe team.</p>
                <div id="inboxList"></div>
            </div>
        </main>
    </div>

    <footer>
        <span>© 2026 BunBabe.</span> All rights reserved. Made with 💗
    </footer>

    <script src="db.js"></script>
    <script>
        let session = JSON.parse(localStorage.getItem('bb_session') || 'null');
        let hiddenReceipts = JSON.parse(localStorage.getItem('bb_hidden_receipts') || '[]');

        function checkAuth() {
            if (!session) {
                window.location.href = 'auth.html';
                return false;
            }
            document.getElementById('userName').innerText = session.firstName;
            return true;
        }

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-section').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.profile-nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            btn.classList.add('active');
            
            if (tabId === 'inbox') {
                document.getElementById('unreadBadge').style.display = 'none';
            }
        }

        async function loadReceipts() {
            const allOrders = await window.DATABASE.getOrders();
            // Filter orders for this user by name (in a real app, use email/ID)
            let userOrders = allOrders.filter(o => o.customerName.includes(session.firstName));
            
            // Filter out hidden/deleted receipts
            userOrders = userOrders.filter(o => !hiddenReceipts.includes(o.id));

            const list = document.getElementById('receiptsList');
            if (userOrders.length === 0) {
                list.innerHTML = '<div style="text-align:center; padding:3rem;"><div style="font-size:3rem; margin-bottom:1rem;">🌸</div><p>No receipts found. Time to shop!</p><a href="shop.html" class="btn" style="margin-top:1rem; display:inline-block;">Go to Shop</a></div>';
                return;
            }

            // Sort newest first
            userOrders.reverse();

            list.innerHTML = userOrders.map(o => {
                const isDone = o.status === 'delivered';
                const statusClass = isDone ? 's-delivered' : 's-pending';
                const statusText = isDone ? '✅ Done' : '⏳ ' + (o.status || 'Pending');

                return `
                <div class="receipt-card" id="card-${o.id}">
                    <div class="receipt-info">
                        <h4>Order ${o.id}</h4>
                        <p>${o.date} • GH₵ ${o.total}</p>
                        <span class="status-pill ${statusClass}">${statusText}</span>
                    </div>
                    <div class="receipt-actions">
                        <a href="receipt.html?id=${encodeURIComponent(o.id)}" class="btn-view" target="_blank">View Receipt</a>
                        <button class="btn-delete" onclick="deleteReceipt('${o.id}')">Delete</button>
                    </div>
                </div>
                `;
            }).join('');
        }

        function deleteReceipt(id) {
            if(confirm("Are you sure you want to delete this receipt from your history?")) {
                hiddenReceipts.push(id);
                localStorage.setItem('bb_hidden_receipts', JSON.stringify(hiddenReceipts));
                document.getElementById('card-' + id).style.display = 'none';
                
                // If all deleted
                if (document.querySelectorAll('.receipt-card[style="display: none;"]').length === document.querySelectorAll('.receipt-card').length) {
                    loadReceipts();
                }
            }
        }

        function loadInbox() {
            // Fetch messages from admin to customers
            let allMessages = JSON.parse(localStorage.getItem('bb_admin_messages') || '[]');
            // Filter messages for this user
            let userMessages = allMessages.filter(m => m.to.toLowerCase() === session.firstName.toLowerCase() || m.to === 'all');
            
            const list = document.getElementById('inboxList');
            if (userMessages.length === 0) {
                list.innerHTML = '<p style="text-align:center; padding:2rem; color:var(--text-light);">Your inbox is empty 🎀</p>';
                return;
            }

            document.getElementById('unreadBadge').style.display = 'inline-block'; // simplistic unread logic

            userMessages.reverse();
            list.innerHTML = userMessages.map(m => `
                <div class="inbox-msg">
                    <div class="msg-header">
                        <span class="msg-title">${m.title || 'Message from BunBabe Team 🎀'}</span>
                        <span class="msg-date">${m.date}</span>
                    </div>
                    <div class="msg-body">${m.body}</div>
                    ${m.link ? `<a href="${m.link}" class="btn" style="margin-top:1rem; display:inline-block; padding:0.5rem 1rem; font-size:0.8rem;">View Link</a>` : ''}
                </div>
            `).join('');

            // Mark these messages as read
            let readMessages = JSON.parse(localStorage.getItem('bb_read_messages') || '[]');
            userMessages.forEach(m => {
                const msgId = m.date + m.title;
                if (!readMessages.includes(msgId)) {
                    readMessages.push(msgId);
                }
            });
            localStorage.setItem('bb_read_messages', JSON.stringify(readMessages));
        }

        function logout() {
            localStorage.removeItem('bb_session');
        }

        window.onload = () => {
            if(checkAuth()) {
                loadReceipts();
                loadInbox();
            }
        };
    </script>
</body>
</html>
