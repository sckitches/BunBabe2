<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Receipt – BunBabe 🧶</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        body {
            background: linear-gradient(135deg, #fde8ee 0%, #fff8f9 50%, #fce4ec 100%);
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            color: #3a2535;
            overflow-x: hidden;
        }

        .receipt-machine {
            position: relative;
            width: 100%;
            max-width: 450px;
            margin-top: 1rem;
        }

        /* The slit where the receipt comes out */
        .machine-slit {
            background: #2a1a25;
            height: 12px;
            border-radius: 6px;
            margin-bottom: -6px;
            position: relative;
            z-index: 10;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.5);
        }

        .receipt-card {
            background: #fffdf5; /* warm paper color */
            width: 90%;
            margin: 0 auto;
            border-radius: 0 0 16px 16px;
            box-shadow: 0 15px 35px rgba(212, 99, 122, 0.15);
            padding: 2.5rem 2rem;
            position: relative;
            transform-origin: top;
            animation: printEffect 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            /* Zig-zag bottom edge */
            clip-path: polygon(0% 0%, 100% 0%, 100% calc(100% - 10px), 95% 100%, 90% calc(100% - 10px), 85% 100%, 80% calc(100% - 10px), 75% 100%, 70% calc(100% - 10px), 65% 100%, 60% calc(100% - 10px), 55% 100%, 50% calc(100% - 10px), 45% 100%, 40% calc(100% - 10px), 35% 100%, 30% calc(100% - 10px), 25% 100%, 20% calc(100% - 10px), 15% 100%, 10% calc(100% - 10px), 5% 100%, 0% calc(100% - 10px));
            padding-bottom: 3.5rem; /* extra space for zig-zag */
        }

        @keyframes printEffect {
            0% { transform: translateY(-100%) scaleY(0); opacity: 0; }
            50% { transform: translateY(0) scaleY(0.5); opacity: 1; }
            100% { transform: translateY(0) scaleY(1); opacity: 1; }
        }

        .receipt-header {
            text-align: center;
            border-bottom: 2px dashed #f59fb0;
            padding-bottom: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .receipt-logo {
            font-family: 'Pacifico', cursive;
            font-size: 2.2rem;
            color: #d4637a;
            margin-bottom: 0.2rem;
        }

        .receipt-meta {
            font-size: 0.85rem;
            color: #9b7490;
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.3rem;
        }

        .item-list {
            margin-bottom: 1.5rem;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .item-row.small {
            font-size: 0.8rem;
            color: #9b7490;
            font-weight: 400;
            margin-top: -0.5rem;
            margin-bottom: 1rem;
        }

        .totals-section {
            border-top: 2px dashed #f59fb0;
            padding-top: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.6rem;
            font-size: 0.9rem;
            color: #7a5c6d;
        }

        .grand-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.4rem;
            font-weight: 900;
            color: #d4637a;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #fde8ee;
        }

        .status-badge {
            display: inline-block;
            background: #fff4e5;
            color: #ed6c02;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 800;
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .receipt-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #9b7490;
            font-weight: 700;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeIn 2s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .btn-receipt {
            background: linear-gradient(135deg, #f59fb0, #d4637a);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-family: inherit;
            font-weight: 800;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(212, 99, 122, 0.3);
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-receipt:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 99, 122, 0.4);
        }

        .btn-secondary {
            background: white;
            color: #d4637a;
            border: 2px solid #f59fb0;
        }

        @media print {
            body { background: white; padding: 0; }
            .action-buttons, .machine-slit { display: none; }
            .receipt-card { 
                box-shadow: none; 
                clip-path: none; 
                animation: none; 
                transform: none; 
                width: 100%;
                max-width: 100%;
                border: 1px solid #ccc;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>

    <div class="receipt-machine">
        <div class="machine-slit"></div>
        <div class="receipt-card" id="receiptContent">
            <div style="text-align:center; padding: 3rem;">
                <p>Loading your magical receipt... ✨</p>
            </div>
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn-receipt" onclick="window.print()">📥 Download PDF</button>
        <button class="btn-receipt btn-secondary" onclick="shareReceipt()">💌 Share</button>
        <a href="index.html" class="btn-receipt btn-secondary">🏠 Back to Shop</a>
    </div>

    <script src="db.js"></script>
    <script>
        async function loadReceipt() {
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('id');
            const container = document.getElementById('receiptContent');

            if (!orderId) {
                container.innerHTML = '<div style="text-align:center;"><h2>Oops! 🎀</h2><p>We couldn\'t find that order. Please check your link.</p></div>';
                return;
            }

            // Wait a tiny bit for DB to initialize
            setTimeout(async () => {
                const orders = await window.DATABASE.getOrders();
                const order = orders.find(o => o.id === orderId);

                if (!order) {
                    container.innerHTML = '<div style="text-align:center;"><h2>Oops! 🎀</h2><p>Order not found. It might still be syncing.</p></div>';
                    return;
                }

                renderReceipt(order);
                createConfetti();
            }, 500);
        }

        function renderReceipt(o) {
            const container = document.getElementById('receiptContent');
            
            // Parse items since they are stored as "2x Plushie, 1x Flower"
            const itemLines = (o.items || '').split(', ').map(itemStr => {
                // simple parsing for display
                const parts = itemStr.match(/^(\d+)x\s+(.*)$/);
                if (parts) {
                    return `<div class="item-row"><span>${parts[1]}x ${parts[2]}</span></div>`;
                }
                return `<div class="item-row"><span>${itemStr}</span></div>`;
            }).join('');

            let paymentDisplay = o.paymentType === 'cash' ? '💵 Cash on Delivery' : '💳 Credit Card';
            let statusColor = o.status === 'delivered' ? '#2e7d32' : (o.status === 'shipped' ? '#6a1b9a' : '#ed6c02');
            let statusBg = o.status === 'delivered' ? '#e6f7ed' : (o.status === 'shipped' ? '#f3e5f5' : '#fff4e5');

            container.innerHTML = `
                <div class="receipt-header">
                    <div class="receipt-logo">BunBabe 🧶</div>
                    <p style="font-size:0.85rem; font-weight:700; color:#9b7490; margin-bottom:1rem;">Handmade with love ✨</p>
                    <div class="receipt-meta">
                        <span>Order ID:</span>
                        <strong style="color:#d4637a;">${o.id}</strong>
                    </div>
                    <div class="receipt-meta">
                        <span>Date:</span>
                        <strong>${o.date}</strong>
                    </div>
                    <div class="receipt-meta">
                        <span>Customer:</span>
                        <strong>${o.customerName}</strong>
                    </div>
                    <div style="text-align:center; margin-top:0.8rem;">
                        <span class="status-badge" style="background:${statusBg}; color:${statusColor};">
                            ${(o.status || 'pending').toUpperCase()}
                        </span>
                    </div>
                </div>

                <div class="item-list">
                    <div style="font-size:0.75rem; text-transform:uppercase; letter-spacing:1px; color:#9b7490; font-weight:800; margin-bottom:0.8rem;">Your Items 🧸</div>
                    ${itemLines}
                    ${o.method === 'pickup' ? '<div class="item-row small"><span>Store Pickup</span></div>' : '<div class="item-row small"><span>Standard Delivery</span></div>'}
                </div>

                <div class="totals-section">
                    <div class="total-row">
                        <span>Payment Method</span>
                        <strong>${paymentDisplay}</strong>
                    </div>
                    ${o.discount > 0 ? `
                    <div class="total-row" style="color:#2e7d32;">
                        <span>Discount (${o.coupon || 'Applied'})</span>
                        <strong>-GH₵ ${o.discount}</strong>
                    </div>` : ''}
                    <div class="grand-total">
                        <span>Total Paid</span>
                        <span>GH₵ ${o.total}</span>
                    </div>
                </div>

                <div class="receipt-footer">
                    ${o.status === 'delivered' ? 
                        `<p style="color:#2e7d32; font-weight:900; font-size:1.1rem;">🎉 Your order is DONE! 🎉</p>
                         <p style="margin-top:0.5rem; font-size:0.85rem;">Enjoy your handmade cuties!</p>
                         <div id="receipt-prompt" style="margin-top: 1.5rem; background: #fff8f9; padding: 1rem; border: 2px dashed #f59fb0; border-radius: 12px;">
                            <p style="font-weight: 800; color: #d4637a; margin-bottom: 0.8rem;">Would you like to keep this receipt in your profile?</p>
                            <div style="display:flex; gap:0.5rem; justify-content:center;">
                                <button class="btn-receipt" style="font-size:0.8rem; padding:0.5rem 1rem; width:auto;" onclick="keepReceipt('${o.id}')">Keep It 💖</button>
                                <button class="btn-receipt btn-secondary" style="font-size:0.8rem; padding:0.5rem 1rem; width:auto;" onclick="deleteReceipt('${o.id}')">Delete It 🗑️</button>
                            </div>
                         </div>` : 
                        '<p>“Your BunBabe is being carefully handmade 🧶💖”</p><p style="margin-top:0.5rem; font-size:0.8rem;">Thank you for supporting handmade magic ✨</p>'
                    }
                </div>
            `;
        }

        function keepReceipt(id) {
            document.getElementById('receipt-prompt').innerHTML = '<p style="color:#2e7d32; font-weight:800; margin:0;">Receipt safely kept in your profile! 💖</p>';
        }

        function deleteReceipt(id) {
            let hidden = JSON.parse(localStorage.getItem('bb_hidden_receipts') || '[]');
            if(!hidden.includes(id)) {
                hidden.push(id);
                localStorage.setItem('bb_hidden_receipts', JSON.stringify(hidden));
            }
            document.getElementById('receipt-prompt').innerHTML = '<p style="color:#d4637a; font-weight:800; margin:0;">Receipt removed from your history. 🗑️</p>';
        }

        function shareReceipt() {
            if (navigator.share) {
                navigator.share({
                    title: 'My BunBabe Receipt 🎀',
                    text: 'I just bought some cute handmade crochet items from BunBabe!',
                    url: window.location.href,
                }).catch(console.error);
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert('Receipt link copied to clipboard! 💌');
            }
        }

        function createConfetti() {
            for (let i = 0; i < 30; i++) {
                const conf = document.createElement('div');
                conf.innerText = ['🎀', '✨', '💖', '🧵', '🧸'][Math.floor(Math.random() * 5)];
                conf.style.position = 'fixed';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = '-50px';
                conf.style.fontSize = Math.random() * 15 + 10 + 'px';
                conf.style.zIndex = '2500';
                conf.style.transition = 'top 3s ease-in, transform 3s ease-in';
                document.body.appendChild(conf);
                
                setTimeout(() => {
                    conf.style.top = '120vh';
                    conf.style.transform = `rotate(${Math.random() * 360}deg)`;
                }, 50);
                setTimeout(() => conf.remove(), 3000);
            }
        }

        window.onload = loadReceipt;
    </script>
</body>
</html>
